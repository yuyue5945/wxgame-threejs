name: 上传到微信小游戏

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (默认自动递增)'
        required: false
        default: ''

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 使用 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 安装 miniprogram-ci
        run: npm install miniprogram-ci

      - name: 写入上传密钥
        env:
          KEY: ${{ secrets.WECHAT_KEY }}
        run: python3 -c "import os; open('private.key','w').write(os.environ['KEY'])"

      - name: 上传到微信小游戏
        env:
          VERSION: ${{ github.event.inputs.version || format('1.0.{0}', github.run_number) }}
        run: node upload.js
