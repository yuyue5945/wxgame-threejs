name: 上传到微信小程序

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (默认自动递增)'
        required: false
        default: ''

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 使用 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 安装 miniprogram-ci
        run: npm install -g miniprogram-ci

      - name: 写入上传密钥
        run: |
          echo "${{ secrets.WECHAT_PRIVATE_KEY }}" > private.key

      - name: 上传代码到微信平台
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="1.0.${{ github.run_number }}"
          fi
          npx miniprogram-ci upload \
            --pp . \
            --pkp private.key \
            --appid wx62b97c93278af4b0 \
            --uv "$VERSION" \
            --ud "来自 GitHub Actions 自动上传" \
            --enable-cloud-download true
